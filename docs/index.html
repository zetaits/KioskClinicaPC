<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Ficha técnica del equipo · ClínicaPC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="status" class="status">Cargando ficha del equipo…</div>

  <div id="actions" class="actions" hidden>
    <button id="downloadBtn" class="btn">Descargar PDF</button>
  </div>

  <!-- Hoja que se exporta a PDF -->
  <main id="sheet" class="sheet" hidden>
    <div class="glow"></div>

    <header class="sheet-head">
      <img class="logo" src="logo.png" alt="ClínicaPC" />
      <div class="doc-title">FICHA TÉCNICA<br/>DEL EQUIPO</div>
    </header>

    <section class="identity">
      <h1 id="title">—</h1>
      <div class="subtitle" id="subtitle"></div>
    </section>

    <section class="price" id="priceBlock" hidden>
      <div class="price-label">PRECIO</div>
      <div class="price-row">
        <span class="price-now" id="priceNow"></span>
        <span class="price-old" id="priceOld"></span>
        <span class="price-disc" id="priceDisc"></span>
      </div>
    </section>

    <section class="components">
      <h2>// COMPONENTES</h2>
      <table id="compTable">
        <tbody></tbody>
      </table>
    </section>

    <footer class="sheet-foot">
      <div class="foot-info">
        <div id="shopline"></div>
        <div class="contact-row">
          <a id="mailLink" class="contact-item" href="#" aria-label="Enviar correo">
            <svg class="ico" viewBox="0 0 24 24" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M4 4h16v16H4zM4 6l8 6 8-6"/></svg>
            <span></span>
          </a>
          <span class="contact-item phone">
            <a id="phoneLink" class="phone-link" href="#" aria-label="Llamar por teléfono">
              <svg class="ico" viewBox="0 0 24 24" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              <span></span>
            </a>
            <a id="waLink" class="wa-link" href="#" target="_blank" rel="noopener" aria-label="Abrir WhatsApp">
              <svg class="ico" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51l-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.885-9.885 9.885m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893A11.821 11.821 0 0 0 20.464 3.488"/></svg>
            </a>
          </span>
        </div>
      </div>
    </footer>
  </main>

  <!-- pako: descomprime el gzip que viaja en el #hash; html2pdf: genera el PDF en el propio móvil -->
  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.2/dist/html2pdf.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
